<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scan Pairing — Dynamic Area</title>
  
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #1D9E75;
      --teal-light: #E1F5EE;
      --gray-50: #F8F8F6;
      --gray-100: #F0EFEA;
      --gray-400: #888780;
      --gray-900: #1A1A18;
      --white: #FFFFFF;
      --border: #E0DED6;
      --radius-md: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    body { font-family: var(--font); background: var(--gray-50); color: var(--gray-900); }
    .app { min-height: 100vh; display: flex; flex-direction: column; }
    .screen { display: none; flex: 1; flex-direction: column; }
    .screen.active { display: flex; }

    /* CONFIG SCREEN */
    .cfg-wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 2rem 1.25rem; max-width: 480px; margin: 0 auto; width: 100%; }
    .field { margin-bottom: 14px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    input { display: block; width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 8px; }

    /* SCANNER UI - DYNAMIC AREA */
    .scanner-container {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      aspect-ratio: 4/3;
    }
    #reader { width: 100%; height: 100%; }

    /* Kotak Dinamis ala Dynamsoft */
    #dynamic-box {
      position: absolute;
      border: 3px solid var(--teal);
      background: rgba(29, 158, 117, 0.15);
      border-radius: 4px;
      pointer-events: none;
      z-index: 10;
      display: none; /* Muncul hanya saat terdeteksi */
      transition: all 0.1s ease-out;
    }

    .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: var(--teal); color: #fff; }

    /* MAIN SCREEN */
    .scan-header { background: var(--white); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
    .scan-body { flex: 1; padding: 16px; max-width: 560px; margin: 0 auto; width: 100%; }
    .resi-card { background: var(--white); border: 2px solid var(--border); border-radius: var(--radius-md); padding: 16px; margin-bottom: 12px; }
    .resi-card.locked { border-color: var(--teal); background: var(--teal-light); }
    .scan-box { background: var(--white); border: 1px solid var(--border); padding: 16px; border-radius: var(--radius-md); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .prod-item { padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 6px; margin-top: 5px; font-family: monospace; }
  </style>
</head>
<body>

<div class="app">
  <div id="scr-cfg" class="screen active">
    <div class="cfg-wrap">
      <h2 style="text-align:center; margin-bottom:20px;">Scan Pairing Setup</h2>
      <div class="field">
        <label>Operator</label>
        <input id="inp-op" type="text" placeholder="Nama Anda">
      </div>
      <div class="field">
        <label>Apps Script URL</label>
        <input id="inp-url" type="url" placeholder="https://script.google.com/...">
      </div>
      <button class="btn btn-primary" onclick="startApp()">Buka Kamera</button>
    </div>
  </div>

  <div id="scr-main" class="screen">
    <div class="scan-header">
      <div id="hdr-op" style="font-weight:bold">Operator</div>
      <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer">Keluar</button>
    </div>

    <div class="scan-body">
      <div class="resi-card" id="resi-card">
        <div style="font-size:11px; color:gray;">STATUS RESI</div>
        <div id="resi-val" style="font-size:20px; font-weight:bold; font-family:monospace;">— Kosong —</div>
      </div>

      <div class="scan-box">
        <div class="scanner-container">
          <div id="reader"></div>
          <div id="dynamic-box"></div>
        </div>
        
        <label id="scan-lbl" style="font-size:12px; font-weight:bold;">SCAN RESI SEKARANG</label>
        <input id="scan-inp" type="text" style="font-family:monospace; font-size:18px; margin-top:5px; background:#f0f0f0;" readonly>
        <button id="btn-reset" class="btn" style="margin-top:10px; display:none; background:#eee;" onclick="resetResi()">Ganti Resi</button>
      </div>

      <div id="log-section" style="margin-top:20px;">
        <div style="font-size:12px; color:gray; margin-bottom:5px;">HASIL SCAN</div>
        <div id="prod-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
let state = { op: '', url: '', mode: 'resi', lastCode: '', isProcessing: false };

async function startApp() {
  state.op = document.getElementById('inp-op').value;
  if(!state.op) return alert("Isi nama dulu");
  
  document.getElementById('scr-cfg').classList.remove('active');
  document.getElementById('scr-main').classList.add('active');
  document.getElementById('hdr-op').textContent = state.op;

  initScanner();
}

function initScanner() {
  const html5QrCode = new Html5Qrcode("reader");
  const dynamicBox = document.getElementById('dynamic-box');

  const config = { 
    fps: 20, 
    qrbox: (viewfinderWidth, viewfinderHeight) => {
        return { width: viewfinderWidth * 0.8, height: viewfinderHeight * 0.6 };
    }
  };

  html5QrCode.start(
    { facingMode: "environment" }, 
    config, 
    (decodedText, result) => {
      // Logika Sekali Simpan & Anti Duplikat
      if (decodedText === state.lastCode || state.isProcessing) return;

      state.isProcessing = true;
      state.lastCode = decodedText;

      // --- EFEK DYNAMSOFT: Tampilkan Kotak di Area Barcode ---
      if (result && result.corners) {
        drawDynamicBox(result.corners);
      }

      // Input data
      document.getElementById('scan-inp').value = decodedText;
      processData(decodedText);

      // Cooldown 2 detik (Tanpa Getar)
      setTimeout(() => {
        dynamicBox.style.display = 'none';
        state.isProcessing = false;
      }, 2000);
    }
  );
}

function drawDynamicBox(corners) {
  const dynamicBox = document.getElementById('dynamic-box');
  const reader = document.getElementById('reader');
  
  // Hitung posisi kotak berdasarkan koordinat yang ditemukan library
  // Catatan: Library html5-qrcode memberikan koordinat relatif terhadap video
  const left = Math.min(...corners.map(c => c.x));
  const top = Math.min(...corners.map(c => c.y));
  const width = Math.max(...corners.map(c => c.x)) - left;
  const height = Math.max(...corners.map(c => c.y)) - top;

  dynamicBox.style.left = (left / reader.clientWidth * 100) + "%";
  dynamicBox.style.top = (top / reader.clientHeight * 100) + "%";
  dynamicBox.style.width = (width / reader.clientWidth * 100) + "%";
  dynamicBox.style.height = (height / reader.clientHeight * 100) + "%";
  dynamicBox.style.display = 'block';
}

function processData(val) {
  if (state.mode === 'resi') {
    state.resi = val;
    state.mode = 'produksi';
    document.getElementById('resi-val').textContent = val;
    document.getElementById('resi-card').classList.add('locked');
    document.getElementById('scan-lbl').textContent = "SCAN KODE PRODUKSI";
    document.getElementById('btn-reset').style.display = 'block';
  } else {
    const item = document.createElement('div');
    item.className = 'prod-item';
    item.textContent = val;
    document.getElementById('prod-list').prepend(item);
    // Di sini bisa tambahkan fetch(state.url) untuk simpan ke Sheets
  }
}

function resetResi() {
  state.mode = 'resi';
  state.lastCode = '';
  document.getElementById('resi-val').textContent = '— Kosong —';
  document.getElementById('resi-card').classList.remove('locked');
  document.getElementById('scan-lbl').textContent = "SCAN KODE RESI";
  document.getElementById('btn-reset').style.display = 'none';
  document.getElementById('prod-list').innerHTML = '';
  document.getElementById('scan-inp').value = '';
}
</script>
</body>
</html>
